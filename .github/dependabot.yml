version: 2
updates:
  - package-ecosystem: cargo
    directory: "."
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    allow:
      - dependency-type: direct
    groups:
      wasmtime:
        patterns:
          - "wasmtime"
          - "wasi-common"
      patch:
        update-types: 
        - patch
